name: CI

# S1-T31 CI pipeline. CI/tooling only — no production code. All CI-critical tools are
# PINNED (no @latest). Jobs invoke the Taskfile where the task is the source of truth
# (contract, drift) so local == CI. Jobs for unbuilt tasks (installer/T29, Pester/T35,
# systemd-analyze/T20, Authenticode/T30, full integration/T34, Schemathesis-as-gate)
# are intentionally ABSENT until their source tasks land.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs for the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned CI-critical tool versions (no @latest).
  GOLANGCI_LINT_VERSION: v2.1.6
  GOVULNCHECK_VERSION: v1.1.4
  TASK_VERSION: v3.39.2
  NODE_VERSION: "20"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed to diff the baseline for only-new-issues
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # golangci-lint (gosec + staticcheck, via .golangci.yml). only-new-issues
      # gates NEW code without failing on the pre-existing baseline (tracked for a
      # separate reviewed cleanup — FI-T31-1; see docs/sprint-1/06-CI.md). This is the
      # standard incremental-adoption pattern for introducing a linter to a codebase
      # with existing debt; it still BLOCKS any newly-introduced lint/gosec issue.
      # only-new-issues diffs against the PR base (reliable on pull_request — the
      # merge gate). On push to main the repo merges with --no-ff, so the merge
      # commit's diff is the whole PR; combined with required-PR branch protection,
      # no new issue reaches main unlinted.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7 # v7 supports golangci-lint v2.x
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m
          only-new-issues: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
      - name: coverage gate (AC-38)
        run: ./scripts/coverage_gate.sh

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race ./...

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: cache ~/.npm (pinned npx tools)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-prism-${{ env.NODE_VERSION }}-5.15.11
      - name: install task (pinned)
        run: go install github.com/go-task/task/v3/cmd/task@${{ env.TASK_VERSION }}
      - name: contract tests (Prism control-plane + update fixtures)
        run: task contract

  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: cache ~/.npm (pinned npx tools)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-codegen-${{ env.NODE_VERSION }}-0.14.2
      - name: install task (pinned)
        run: go install github.com/go-task/task/v3/cmd/task@${{ env.TASK_VERSION }}
      - name: OpenAPI / codegen drift
        run: task check:generated
      - name: update-fixture drift
        run: |
          task fixtures
          git diff --exit-code
      - name: go.mod / go.sum tidy drift
        run: |
          go mod tidy
          git diff --exit-code

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the secret scan covers every commit
      - name: gitleaks (secret + private-key scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck (pinned)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          govulncheck ./...

  cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: cross-compile ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build ./...

  windows-test:
    runs-on: windows-latest
    # NON-BLOCKING for now (informational): this is the FIRST real execution of the
    # Windows code paths (MoveFileEx swap, service.Status). Several existing tests use
    # os.Chmod(dir, 0o500) to force a write failure, which Windows does not enforce on
    # directories, so they need a runtime.GOOS=="windows" skip before this job can gate
    # (FI-T31-2, a separate reviewed test-portability fix). The job still RUNS on every
    # CI and surfaces real Windows behaviour; it becomes a required gate once green.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...

  installer-build:
    runs-on: windows-latest
    # NON-BLOCKING (informational): compiles the S1-T29 Inno Setup artifact. Inno
    # Setup is Windows-only, so the .iss CONTENT is validated by the Go tests in
    # installer/ on every runner; this job additionally produces the setup .exe.
    # The artifact is UNSIGNED (Authenticode = S1-T30). It becomes a required gate
    # only after the S1-T35 Pester suite validates the produced installer
    # end-to-end (T35 is NOT required yet).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build version-info + version-stamped binaries
        shell: pwsh
        run: |
          $v = (Get-Content VERSION -Raw).Trim()
          $p = $v.Split('.')
          $gvi = 'github.com/josephspurrier/goversioninfo/cmd/goversioninfo@v1.4.1'
          go run $gvi -64 -ver-major=$($p[0]) -ver-minor=$($p[1]) -ver-patch=$($p[2]) -ver-build=0 -file-version="$v.0" -product-version="$v.0" -o cmd/agent/resource_windows_amd64.syso build/windows/versioninfo.agent.json
          go run $gvi -64 -ver-major=$($p[0]) -ver-minor=$($p[1]) -ver-patch=$($p[2]) -ver-build=0 -file-version="$v.0" -product-version="$v.0" -o cmd/updater/resource_windows_amd64.syso build/windows/versioninfo.updater.json
          $ld = "-s -w -X github.com/beyzbackup/beyz-backup/internal/buildinfo.Version=$v -X github.com/beyzbackup/beyz-backup/internal/buildinfo.Channel=dev"
          $env:GOOS = 'windows'; $env:GOARCH = 'amd64'; $env:CGO_ENABLED = '0'
          go build -trimpath -ldflags $ld -o dist/windows/beyz-backup-agent.exe ./cmd/agent
          go build -trimpath -ldflags $ld -o dist/windows/beyz-backup-updater.exe ./cmd/updater
      - name: install Inno Setup (pinned)
        run: choco install innosetup --version=6.2.2 --no-progress -y
      - name: compile installer (ISCC)
        shell: pwsh
        run: |
          $v = (Get-Content VERSION -Raw).Trim()
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DBinDir=dist\windows /DAppVersion=$v installer\beyz-backup.iss
      - name: upload setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeyzBackupSetup
          path: installer/Output/*.exe
          if-no-files-found: error

  pester:
    runs-on: windows-latest
    needs: installer-build
    # NON-BLOCKING (informational): S1-T35 Windows installer + service validation.
    # Drives the REAL SCM + the installer artifact (silent install, ACLs, service,
    # token-not-logged, uninstall/KEEPSTATE). The windows runner is admin. Becomes
    # a required gate only once stable. Pester is pinned. Consumes the installer
    # artifact from installer-build, building it as a fallback if absent.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build windows/amd64 binaries
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -o dist/windows/beyz-backup-agent.exe ./cmd/agent
          go build -o dist/windows/beyz-backup-updater.exe ./cmd/updater
      - name: download installer artifact (best-effort)
        uses: actions/download-artifact@v4
        with:
          name: BeyzBackupSetup
          path: installer/Output
        continue-on-error: true
      - name: build installer if artifact missing (fallback)
        shell: pwsh
        run: |
          if (-not (Get-ChildItem installer/Output/BeyzBackupSetup-*.exe -ErrorAction SilentlyContinue)) {
            $v = (Get-Content VERSION -Raw).Trim()
            choco install innosetup --version=6.2.2 --no-progress -y
            & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DBinDir=dist\windows /DAppVersion=$v installer\beyz-backup.iss
          }
      - name: install Pester (pinned)
        shell: pwsh
        run: Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck
      - name: run Pester (installer + service suites)
        shell: pwsh
        env:
          BEYZ_BIN_DIR: ${{ github.workspace }}\dist\windows
        run: |
          Import-Module Pester -RequiredVersion 5.7.1
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = 'test/pester'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

  sign-smoke:
    runs-on: windows-latest
    # NON-BLOCKING (informational): proves the S1-T30 version-info + Authenticode
    # signing pipeline end-to-end with an EPHEMERAL self-signed certificate. It
    # uses NO real certificate and NO repository/CI secret, so it is safe on PR CI
    # (incl. fork PRs). The REAL-cert path (a protected-environment secret) is the
    # SAME installer/scripts/sign.ps1 code and is a release-time step, NOT wired
    # here (no production signing secret / no release publishing in Sprint 1).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build version-info + version-stamped binaries and installer
        shell: pwsh
        run: |
          $v = (Get-Content VERSION -Raw).Trim()
          $p = $v.Split('.')
          $gvi = 'github.com/josephspurrier/goversioninfo/cmd/goversioninfo@v1.4.1'
          go run $gvi -64 -ver-major=$($p[0]) -ver-minor=$($p[1]) -ver-patch=$($p[2]) -ver-build=0 -file-version="$v.0" -product-version="$v.0" -o cmd/agent/resource_windows_amd64.syso build/windows/versioninfo.agent.json
          go run $gvi -64 -ver-major=$($p[0]) -ver-minor=$($p[1]) -ver-patch=$($p[2]) -ver-build=0 -file-version="$v.0" -product-version="$v.0" -o cmd/updater/resource_windows_amd64.syso build/windows/versioninfo.updater.json
          $ld = "-s -w -X github.com/beyzbackup/beyz-backup/internal/buildinfo.Version=$v -X github.com/beyzbackup/beyz-backup/internal/buildinfo.Channel=dev"
          $env:GOOS = 'windows'; $env:GOARCH = 'amd64'; $env:CGO_ENABLED = '0'
          go build -trimpath -ldflags $ld -o dist/windows/beyz-backup-agent.exe ./cmd/agent
          go build -trimpath -ldflags $ld -o dist/windows/beyz-backup-updater.exe ./cmd/updater
          choco install innosetup --version=6.2.2 --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DBinDir=dist\windows /DAppVersion=$v installer\beyz-backup.iss
      - name: self-signed sign + verify smoke (no secret)
        shell: pwsh
        run: |
          $setup = (Get-ChildItem installer/Output/BeyzBackupSetup-*.exe | Select-Object -First 1).FullName
          ./build/windows/sign-smoke.ps1 -Path @('dist/windows/beyz-backup-agent.exe', 'dist/windows/beyz-backup-updater.exe', $setup)
