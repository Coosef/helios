version: '3'

# Beyz Backup task runner. Requires go-task (https://taskfile.dev).
# Targets marked [Sx-Tyy] are stubs that print their owning task until that
# Sprint 1 task is implemented.

vars:
  MODULE: github.com/beyzbackup/beyz-backup
  PKG_BUILDINFO: '{{.MODULE}}/internal/buildinfo'
  BIN_DIR: dist
  EXE: '{{if eq OS "windows"}}.exe{{end}}'
  # Single version source (S1-T30): the repo-root VERSION file. Shared by the Go
  # ldflags, the Windows version-info resource, the Inno AppVersion, and the
  # artifact names (a static test asserts they never drift).
  VERSION:
    sh: tr -d '[:space:]' < VERSION 2>/dev/null || echo "0.0.0-dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  # Release channel: "dev" by default; override e.g. `task dist CHANNEL=stable`.
  CHANNEL: dev
  # Pinned Windows version-info generator (run-on-demand; never committed .syso).
  GOVERSIONINFO: github.com/josephspurrier/goversioninfo/cmd/goversioninfo@v1.4.1
  LDFLAGS: >-
    -s -w
    -X {{.PKG_BUILDINFO}}.Version={{.VERSION}}
    -X {{.PKG_BUILDINFO}}.Commit={{.COMMIT}}
    -X {{.PKG_BUILDINFO}}.Date={{.DATE}}
    -X {{.PKG_BUILDINFO}}.Channel={{.CHANNEL}}

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build agent and updater for the host platform
    deps: [build:agent, build:updater]

  build:agent:
    desc: Build beyz-backup-agent
    cmds:
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/beyz-backup-agent{{.EXE}} ./cmd/agent

  build:updater:
    desc: Build beyz-backup-updater
    cmds:
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/beyz-backup-updater{{.EXE}} ./cmd/updater

  run:agent:
    desc: Run the agent scaffold (pass args after --)
    cmds:
      - go run ./cmd/agent {{.CLI_ARGS}}

  run:updater:
    desc: Run the updater scaffold (pass args after --)
    cmds:
      - go run ./cmd/updater {{.CLI_ARGS}}

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:race:
    desc: Run unit tests with the race detector
    cmds:
      - go test -race ./...

  test:negative:
    desc: '[S1-T32] Theme-G security negative suite (fail-closed controls) — the CI security gate'
    cmds:
      # The consolidated end-to-end theme-G suite PLUS the security-critical
      # packages whose negative tests must gate merges (AC-38: signature-negative
      # tests as a required check).
      - go test ./test/security/... ./internal/updater/verify/... ./internal/updater/manifestcheck/... ./internal/updater/trust/... ./internal/transport/httpclient/... ./internal/agent/logging/... ./internal/agent/state/... ./internal/agent/enroll/...

  cover:
    desc: Run tests with coverage and print a function summary
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Format the codebase with gofmt -s
    cmds:
      - gofmt -s -w .

  lint:
    desc: Run golangci-lint (must be installed; pinned in CI)
    cmds:
      - golangci-lint run ./...

  lint:systemd:
    desc: '[S1-T20] Lint the Linux systemd units (systemd-analyze verify; optional/non-blocking)'
    cmds:
      # The always-on gate is the Go static unit test (test/systemd); this is the
      # optional Linux-only lint. Warnings about a missing ExecStart binary are
      # expected when the agent is not installed on the linter host, so verify
      # failures are reported, not fatal.
      - |
        if command -v systemd-analyze >/dev/null 2>&1; then
          systemd-analyze verify \
            build/linux/beyz-backup-agent.service \
            build/linux/beyz-backup-updater.service \
            build/linux/beyz-backup-updater.timer \
            && echo "systemd units verified" \
            || echo "systemd-analyze reported warnings (often a not-yet-installed ExecStart binary); review above"
        else
          echo "systemd-analyze not available on this host; skipping (test/systemd is the always-on gate)"
        fi

  tidy:
    desc: Tidy go.mod / go.sum
    cmds:
      - go mod tidy

  spec:lint:
    desc: '[S1-T02] Validate the OpenAPI control-plane spec (Redocly — canonical gate)'
    cmds:
      # Redocly is the canonical validator: it is fully OpenAPI 3.1-aware. Spectral
      # currently crashes on 3.1 `type: [..., "null"]` nodes (nimma bug), so it is
      # not used as the gate.
      - npx --yes @redocly/cli@1 lint api/openapi.yaml # pinned to the 1.x major (no @latest)

  spec:mock:
    desc: '[S1-T02] Boot a Prism mock of the control-plane spec on :4010'
    cmds:
      - npx --yes @stoplight/prism-cli@5.15.11 mock api/openapi.yaml -p 4010

  gen:
    desc: 'Regenerate all generated artifacts from their sources of truth'
    deps: [gen:proto, gen:config]

  gen:config:
    desc: '[S1-T07] Regenerate configs/config.schema.json from the embedded source of truth'
    cmds:
      - cp internal/agent/config/config.schema.json configs/config.schema.json

  gen:proto:
    desc: '[S1-T03] Generate pkg/proto from api/openapi.yaml (3.1->3.0 down-convert -> oapi-codegen)'
    cmds:
      # oapi-codegen does not yet support OpenAPI 3.1, so the 3.1 source of truth
      # is deterministically down-converted to a TRANSIENT 3.0 doc (api/.gen/,
      # gitignored) and fed to oapi-codegen. api/openapi.yaml stays the single
      # source of truth; pkg/proto/*.gen.go is generated and never hand-edited.
      - mkdir -p api/.gen
      - npx --yes @apiture/openapi-down-convert@0.14.2 --input api/openapi.yaml --output api/.gen/openapi.v3.0.yaml
      - go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1 --config api/oapi-codegen.yaml api/.gen/openapi.v3.0.yaml

  check:generated:
    desc: '[S1-T03] Fail if generated code drifts from the spec (CI drift gate)'
    cmds:
      - task gen:proto
      - git diff --exit-code -- pkg/proto go.mod go.sum

  fixtures:
    desc: '[S1-T28] (Re)generate the signed update fixtures under test/fixtures/ (public material only)'
    cmds:
      - go run ./cmd/mkfixtures
      - go test ./internal/mocksaas/...

  contract:
    desc: '[S1-T28] Contract tests: Prism control-plane mock + signed update fixtures'
    cmds:
      - |
        set -e
        npx --yes @stoplight/prism-cli@5.15.11 mock api/openapi.yaml -p 4010 >/tmp/prism-mock.log 2>&1 &
        PRISM_PID=$!
        trap "kill $PRISM_PID 2>/dev/null || true" EXIT
        # Prism validates requests; readiness only needs the port serving (any HTTP
        # code). Bounded 30s poll; on timeout we dump the Prism log so a real npm/npx
        # download failure surfaces its cause (the ~/.npm CI cache makes that rare).
        # (Note: $PRISM_PID is the npx wrapper, which exits after spawning Prism, so
        # the port poll — not a PID check — is the reliable readiness signal.)
        ready=
        for i in $(seq 1 30); do
          if curl -s -o /dev/null http://127.0.0.1:4010/v1/enroll; then ready=1; break; fi
          sleep 1
        done
        if [ -z "$ready" ]; then echo "ERROR: Prism mock did not start on :4010 (see /tmp/prism-mock.log)"; cat /tmp/prism-mock.log; exit 1; fi
        PRISM_URL=http://127.0.0.1:4010 go test ./internal/mocksaas/...
      - echo "contract OK — Prism control-plane mock + update fixtures verified"

  contract:fuzz:
    desc: '[S1-T28] (opt-in) Schemathesis property-fuzz the spec against Prism (needs Python/uvx)'
    cmds:
      - |
        set -e
        npx --yes @stoplight/prism-cli@5.15.11 mock api/openapi.yaml -p 4010 >/tmp/prism-fuzz.log 2>&1 &
        PRISM_PID=$!
        trap "kill $PRISM_PID 2>/dev/null || true" EXIT
        sleep 3
        uvx schemathesis run --url http://127.0.0.1:4010 --checks all api/openapi.yaml

  gen:versioninfo:
    desc: '[S1-T30] Generate Windows version-info .syso for agent + updater (gitignored)'
    vars:
      VMAJ:
        sh: cut -d. -f1 < VERSION | tr -d '[:space:]'
      VMIN:
        sh: cut -d. -f2 < VERSION | tr -d '[:space:]'
      VPAT:
        sh: cut -d. -f3 < VERSION | tr -d '[:space:]'
    cmds:
      - go run {{.GOVERSIONINFO}} -64 -ver-major={{.VMAJ}} -ver-minor={{.VMIN}} -ver-patch={{.VPAT}} -ver-build=0 -file-version="{{.VERSION}}.0" -product-version="{{.VERSION}}.0" -o cmd/agent/resource_windows_amd64.syso build/windows/versioninfo.agent.json
      - go run {{.GOVERSIONINFO}} -64 -ver-major={{.VMAJ}} -ver-minor={{.VMIN}} -ver-patch={{.VPAT}} -ver-build=0 -file-version="{{.VERSION}}.0" -product-version="{{.VERSION}}.0" -o cmd/updater/resource_windows_amd64.syso build/windows/versioninfo.updater.json

  cross:
    desc: '[S1-T30] Cross-compile versioned binaries (windows/amd64 + linux/amd64,arm64)'
    deps: [gen:versioninfo]
    cmds:
      - GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/windows/beyz-backup-agent.exe ./cmd/agent
      - GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/windows/beyz-backup-updater.exe ./cmd/updater
      - GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/linux-amd64/beyz-backup-agent ./cmd/agent
      - GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/linux-amd64/beyz-backup-updater ./cmd/updater
      - GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/linux-arm64/beyz-backup-agent ./cmd/agent
      - GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/linux-arm64/beyz-backup-updater ./cmd/updater

  installer:
    desc: '[S1-T29/T30] Build the Inno Setup installer (Windows; ISCC + version unification)'
    deps: [cross]
    cmds:
      # ISCC (Inno Setup compiler) is Windows-only; /DAppVersion unifies the version.
      - 'command -v ISCC >/dev/null 2>&1 && ISCC /DBinDir={{.BIN_DIR}}/windows /DAppVersion={{.VERSION}} installer/beyz-backup.iss || echo "installer: Inno Setup (ISCC) is Windows-only; produced by the CI installer-build job"'

  dist:
    desc: '[S1-T30] Produce distributable artifacts (binaries + SHA256SUMS). Authenticode signing + the installer are Windows/CI steps.'
    deps: [cross]
    cmds:
      - 'cd {{.BIN_DIR}} && shasum -a 256 windows/* linux-amd64/* linux-arm64/* > SHA256SUMS'
      - 'echo "dist: version {{.VERSION}} channel {{.CHANNEL}} -> {{.BIN_DIR}}/{windows,linux-amd64,linux-arm64}/* + SHA256SUMS (UNSIGNED). Authenticode signing (installer/scripts/sign.ps1) + the installer run on Windows / the CI sign-smoke job."'

  clean:
    desc: Remove build and coverage output
    cmds:
      - rm -rf {{.BIN_DIR}} coverage.out
